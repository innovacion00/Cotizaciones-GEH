services:
  server:
    build:
      context: .
      target: server
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped

  client:
    build:
      context: .
      target: client
      args:
        API_URL: ${API_URL:-http://localhost:3000}
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    ports:
      - "4321:4321"
    depends_on:
      - server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
      - client
    restart: unless-stopped
